  var m=document.getElementById("md");if(S.dlg){m.className="md";m.innerHTML=htmlDlg();}else{m.className="md h";m.innerHTML="";}
}
function vlabel(v){return "Wk"+v.wk+" · V"+v.v;}
function htmlH(){
  var idx=curI(),v=VISITS[idx],s=v[S.person],p=pos(S.person);
  var h='<div class="hr1"><div class="htt">Joint Log';
  h+='<span class="svb '+syncClass()+'" id="syncb" data-a="resync">'+syncLabel()+'</span>';
  h+='</div><button class="hps" data-a="exp">'+ico("up2",12)+' data</button></div>';
  h+='<div class="pt">'+
     '<button class="pp ion'+(S.person==="ion"?" on":"")+'" data-a="per" data-p="ion">ION</button>'+
     '<button class="pp brit'+(S.person==="brit"?" on":"")+'" data-a="per" data-p="brit">BRIT</button></div>';
  h+='<div class="nb"><button class="na" data-a="prev"'+(idx===0?" disabled":"")+'>'+ico("cl")+'</button>'+
     '<button class="np" data-a="goto"><div class="nm"><span class="tag tg-'+v.tag+'">'+vlabel(v)+'</span>'+
     '<span class="nd">'+esc(NAME[S.person])+'</span><span class="nn">'+(idx+1)+'/'+TOT+'</span></div>'+
     '<div class="nf">'+esc(s.f)+'</div></button>'+
     '<button class="na" data-a="next"'+(idx===TOT-1?" disabled":"")+'>'+ico("cr")+'</button></div>';
  return h;
}
function htmlT(){
  var t=[["workout","Workout"],["history","History"],["program","Plan"]];var o="";
  for(var i=0;i<t.length;i++)o+='<button class="tb'+(S.tab===t[i][0]?" on":"")+'" data-a="tab" data-t="'+t[i][0]+'">'+t[i][1]+'</button>';
  return o;
}
function htmlC(){return S.tab==="workout"?htmlW():S.tab==="history"?htmlHi():htmlPr();}
function ztag(zone,txt){return '<span class="z z-'+zone+'"></span>'+esc(txt);}
function exHist(name,idx){ // last logged for this person before idx
  var lg=S.logs[S.person];
  for(var k=idx-1;k>=0;k--){var l=lg[k];if(!l||!l.exs)continue;for(var i=0;i<l.exs.length;i++)if(l.exs[i].n===name&&l.exs[i].s&&l.exs[i].s.length)return l.exs[i].s;}
  return null;
}
function htmlW(){
  var idx=curI(),v=VISITS[idx],sess=v[S.person],oth=v[OTHER[S.person]];
  var log=plogs()[idx];var sk={};var a=psk();for(var i=0;i<a.length;i++)sk[a[i]]=1;var isSk=!!sk[idx];
  var h='<div class="wh"><div class="wm"><span class="tag tg-'+v.tag+'">'+vlabel(v)+'</span>'+
        '<span class="wn">'+esc(sess.f)+'</span>'+(sess.rir?'<span class="rir">'+esc(sess.rir)+'</span>':'')+'</div>';
  if(v.note)h+='<div class="ws" style="font-style:italic">'+esc(v.note)+'</div>';
  h+='</div>';
  // partner peek
  h+='<div class="peek"><button class="peekh" data-a="peek" style="width:100%">'+ico(S.peek?"dn":"cr",13)+
     '<span><b>'+esc(NAME[OTHER[S.person]])+'</b> this visit · '+esc(oth.f)+'</span></button>';
  if(S.peek){h+='<div class="peekc">';for(var j=0;j<oth.e.length;j++){var e=oth.e[j];
    h+='<div class="pkx"><div class="pkn">'+esc(e[0])+'<div class="pkg">'+ztag(e[3],e[2])+'</div></div><span class="pkr">'+esc(e[1])+'</span></div>';}
    h+='</div>';}
  h+='</div>';
  // session card
  h+='<div class="cd"><div class="ch"><span class="chm">'+esc(NAME[S.person])+' · '+(idx+1)+'/'+TOT+(isSk?' · skipped':'')+'</span>';
  if(log)h+='<button class="dnb '+((log.done)?"dnb-on":"dnb-off")+'" data-a="done">'+((log.done)?ico("ck",11)+' done':'mark done')+'</button>';
  h+='</div>';
  var dv=(log&&log.date)?log.date:today();
  h+='<div class="dr"><span>Logged</span><span class="dw"><input type="date" value="'+dv+'" data-a="date"><span class="dd">'+esc(nice(dv))+'</span></span></div>';
  for(var k=0;k<sess.e.length;k++){var ex=sess.e[k];
    var lgd=null;if(log&&log.exs)for(var m=0;m<log.exs.length;m++)if(log.exs[m].n===ex[0]){lgd=log.exs[m];break;}
    h+=htmlEx(ex,lgd,idx);}
  // extras
  if(log&&log.exs){var tn={};for(var z=0;z<sess.e.length;z++)tn[sess.e[z][0]]=1;
    var extras=log.exs.filter(function(e){return !tn[e.n];});
    for(var x=0;x<extras.length;x++)h+=htmlEx([extras[x].n,"extra","DB","db",""],extras[x],idx);}
  h+='</div>';
  if(S.addEx){h+='<div style="margin:0 12px 12px;display:flex;gap:6px"><input id="addI" placeholder="extra exercise" value="'+esc(S.addExName)+'" style="flex:1;background:var(--b3);border:1px solid var(--bd);border-radius:4px;padding:8px"><button class="qag" data-a="addGo">add</button><button class="qac" data-a="addCx">'+ico("x",14)+'</button></div>';}
  else h+='<div style="margin:0 12px 12px"><button class="sb" data-a="addOpen" style="width:100%;border:1px dashed var(--bd);border-radius:8px;color:var(--dm)">'+ico("pl",13)+' add extra exercise</button></div>';
  if(!isSk&&!log)h+='<div class="sw"><button class="sb" data-a="skip">skip this for '+esc(NAME[S.person])+'</button></div>';
  return h;
}
function htmlEx(ex,lg,idx){
  var name=ex[0],reps=ex[1],gym=ex[2],zone=ex[3],load=ex[4];
  var isEd=S.es&&S.es.n===name;
  var h='<div class="ex"><div class="exn">'+esc(name)+'</div>';
  h+='<div class="exg">'+ztag(zone,gym)+'</div>';
  h+='<div class="exp">'+esc(reps)+(load?' · <span class="start">start: '+esc(load)+'</span>':'')+'</div>';
  if(lg&&lg.s&&lg.s.length){h+='<div class="ss">';
    for(var i=0;i<lg.s.length;i++){var st=lg.s[i];var ed=isEd&&S.es.i===i;
      h+='<button class="pl'+(ed?' ple':'')+'" data-a="edit" data-e="'+esc(name)+'" data-i="'+i+'"><span class="pli">'+(i+1)+'</span><span class="plw">'+(st.w!=null?st.w:"BW")+'</span><span class="plx">×</span><span>'+st.r+'</span>'+(st.no?'<span class="pln">'+esc(st.no)+'</span>':'')+'<span class="pld" data-a="del" data-e="'+esc(name)+'" data-i="'+i+'">'+ico("x",11)+'</span></button>';}
    h+='</div>';}
  else{var his=exHist(name,idx);if(his){var t="";for(var k=0;k<his.length;k++){if(k)t+=", ";t+=(his[k].w!=null?his[k].w:"BW")+"×"+his[k].r;}h+='<div class="exp" style="color:var(--fa);font-style:italic">last: '+esc(t)+'</div>';}}
  var dW="",dR="",dN="",dBW=false;
  if(isEd&&S.es.i!=null&&lg){var es=lg.s[S.es.i];if(es){if(es.w==null)dBW=true;else dW=es.w;dR=es.r;dN=es.no||"";}}
  else if(lg&&lg.s&&lg.s.length){var last=lg.s[lg.s.length-1];if(last.w==null)dBW=true;else dW=last.w;}
  var eid='qa_'+name.replace(/[^a-zA-Z0-9]/g,'_');
  h+='<div class="qa"><button class="qbw'+(dBW?' on':'')+'" id="'+eid+'_bw" data-a="bw" data-e="'+esc(name)+'">BW</button>'+
     '<input type="text" inputmode="decimal" placeholder="'+(dBW?'BW':'wt')+'" class="qnum'+(dBW?' bwon':'')+'" id="'+eid+'_w" value="'+(dBW?'':dW)+'"'+(dBW?' readonly data-bw="1"':'')+' data-f="w" data-e="'+esc(name)+'">'+
     '<span class="qax">×</span>'+
     '<input type="text" inputmode="numeric" placeholder="reps" class="qnum" id="'+eid+'_r" value="'+dR+'" data-f="r" data-e="'+esc(name)+'">'+
     '<input type="text" placeholder="notes" class="qno" id="'+eid+'_no" value="'+esc(dN)+'" data-f="no" data-e="'+esc(name)+'">';
  if(isEd&&S.es.i!=null)h+='<button class="qag" data-a="save" data-e="'+esc(name)+'">save</button><button class="qac" data-a="cancel">'+ico("x",12)+'</button>';
  else h+='<button class="qag" data-a="add" data-e="'+esc(name)+'">+</button>';
  h+='</div></div>';
  return h;
}
function htmlHi(){
  var lg=S.logs[S.person];var arr=[];
  for(var k in lg)if(lg.hasOwnProperty(k)){var l=lg[k];if(l&&l.exs&&l.exs.length)arr.push([+k,l]);}
  arr.sort(function(a,b){return (b[1].date||"").localeCompare(a[1].date||"");});
  var bar='<div class="dlbar"><button class="dlbtn" data-a="exp">'+ico("up2",14)+' Export</button><button class="dlbtn" data-a="imp">'+ico("dn2",14)+' Import</button></div>';
  if(!arr.length)return bar+'<div class="em2">No sessions logged for '+esc(NAME[S.person])+' yet.</div>';
  var o=bar;
  for(var i=0;i<arr.length;i++){var vi2=arr[i][0],l=arr[i][1],v=VISITS[vi2];if(!v)continue;var sess=v[S.person];
    var tot=0;for(var j=0;j<l.exs.length;j++)tot+=(l.exs[j].s?l.exs[j].s.length:0);
    o+='<button class="hi" data-a="jump" data-i="'+vi2+'"><div class="hh"><div style="min-width:0;flex:1"><div class="hd2">'+esc(nice(l.date||today()))+'</div><div class="hm">'+esc(sess.f)+' · '+tot+' sets</div></div><span class="tag tg-'+v.tag+'">'+vlabel(v)+'</span></div>';
    for(var k2=0;k2<l.exs.length;k2++){var e=l.exs[k2],ss="";if(e.s)for(var mm=0;mm<e.s.length;mm++){if(mm)ss+=", ";ss+=(e.s[mm].w!=null?e.s[mm].w+"×":"")+e.s[mm].r;}
      o+='<div class="he"><span class="hen">'+esc(e.n)+'</span><span class="hes">'+esc(ss)+'</span></div>';}
    o+='</button>';}
  return o;
}
function htmlPr(){
  var o="";var lastwk=0;
  for(var i=0;i<TOT;i++){var v=VISITS[i];
    if(v.wk!==lastwk){lastwk=v.wk;o+='<div style="padding:14px 14px 2px;font-weight:700;color:var(--acl)">Week '+v.wk+'</div>';}
    o+='<div class="pv"><div class="pvh"><span class="tag tg-'+v.tag+'">'+vlabel(v)+'</span>'+(v.note?'<span style="font-style:italic">'+esc(v.note)+'</span>':'')+'</div><div class="pvcols">';
    o+=pvcol(v.ion,"ion");o+=pvcol(v.brit,"brit");o+='</div></div>';
  }
  return o;
}
function pvcol(sess,who){
  var h='<div class="pvc '+who+'"><div class="pvwho">'+NAME[who].toUpperCase()+(sess.rir?' · '+esc(sess.rir):'')+'</div><div class="pvf">'+esc(sess.f)+'</div>';
  for(var i=0;i<sess.e.length;i++){var e=sess.e[i];h+='<div class="pvx"><span style="flex:1;min-width:0">'+esc(e[0])+'<br><span class="pkg">'+ztag(e[3],e[2])+'</span></span><span class="pvr">'+esc(e[1])+'</span></div>';}
  return h+'</div>';
}
function htmlF(){return "";}
function htmlDlg(){
  var isE=S.dlg==="exp";
  var h='<div class="mds"><div class="mh2"><div class="mt">'+(isE?"Export":"Import")+' data</div><button class="mc" data-a="closeD">'+ico("x",18)+'</button></div><div class="dlbody">';
  if(isE)h+='<div style="color:var(--dm);font-size:12px">Copy this, then paste it into the baseline-data script tag in the .html to bake it in (auto-loads next open).</div>';
  if(!isE)h+='<div style="color:#fde68a;font-size:12px">Paste exported JSON — replaces ALL data (both people).</div>';
  if(S.dlgMsg)h+='<div style="color:var(--acl);font-size:12px">'+esc(S.dlgMsg)+'</div>';
  h+='<textarea id="dta" class="dlta" '+(isE?'readonly':'placeholder="paste JSON"')+'>'+esc(S.dlgTxt)+'</textarea>';
  h+=isE?'<button class="pas" data-a="copyD">Select all</button>':'<button class="pas" data-a="doImp">Replace data</button>';
  return h+'</div></div>';
}
/* ---- actions ---- */
function getF(name){var e='qa_'+name.replace(/[^a-zA-Z0-9]/g,'_');return {w:document.getElementById(e+'_w'),r:document.getElementById(e+'_r'),no:document.getElementById(e+'_no'),bw:document.getElementById(e+'_bw')};}
function ensureLog(idx){var lg=plogs();if(!lg[idx])lg[idx]={date:today(),exs:[]};if(!lg[idx].exs)lg[idx].exs=[];return lg[idx];}
function addSet(name,set){var idx=curI();var l=ensureLog(idx);var f=null;for(var i=0;i<l.exs.length;i++)if(l.exs[i].n===name){f=l.exs[i];break;}if(!f){f={n:name,s:[]};l.exs.push(f);}if(!f.s)f.s=[];f.s.push(set);S.vi=idx;persist();render();}
function submit(name){var f=getF(name);if(!f.r||!f.r.value)return;var bw=f.w&&f.w.dataset.bw==="1";var w=bw?null:(f.w&&f.w.value!==""?parseFloat(f.w.value):null);var r=parseInt(f.r.value,10)||0;if(!r)return;addSet(name,{w:w,r:r,no:(f.no&&f.no.value)||""});}
function saveEdit(name){if(!S.es)return;var f=getF(name);if(!f.r||!f.r.value)return;var bw=f.w&&f.w.dataset.bw==="1";var w=bw?null:(f.w&&f.w.value!==""?parseFloat(f.w.value):null);var r=parseInt(f.r.value,10)||0;if(!r)return;var l=plogs()[curI()];if(l)for(var i=0;i<l.exs.length;i++)if(l.exs[i].n===name&&l.exs[i].s[S.es.i]){l.exs[i].s[S.es.i]={w:w,r:r,no:(f.no&&f.no.value)||""};break;}S.es=null;persist();render();}
function del(name,si){var idx=curI();var l=plogs()[idx];if(!l)return;var ne=[];for(var i=0;i<l.exs.length;i++){var e=l.exs[i];if(e.n!==name){ne.push(e);continue;}var ns=[];for(var j=0;j<e.s.length;j++)if(j!==si)ns.push(e.s[j]);if(ns.length)ne.push({n:e.n,s:ns});}if(!ne.length&&!l.note)delete plogs()[idx];else l.exs=ne;persist();render();}
function toggleBW(name){var f=getF(name);if(!f.w)return;var on=f.w.dataset.bw==="1";if(on){f.w.dataset.bw="";f.w.readOnly=false;f.w.placeholder="wt";f.w.classList.remove("bwon");if(f.bw)f.bw.classList.remove("on");f.w.focus();}else{f.w.dataset.bw="1";f.w.value="";f.w.readOnly=true;f.w.placeholder="BW";f.w.classList.add("bwon");if(f.bw)f.bw.classList.add("on");if(f.r)f.r.focus();}}
function expOpen(){S.dlgTxt=JSON.stringify({logs:S.logs,skipped:S.skipped});S.dlg="exp";S.dlgMsg="";render();}
function doImp(){var ta=document.getElementById("dta");if(!ta)return;var t=ta.value||"";var st;try{var p=JSON.parse(t);}catch(e){S.dlgMsg="Bad JSON";render();return;}if(p&&p.logs)st=p;else if(p&&p.data&&p.data[KEY]){try{st=JSON.parse(p.data[KEY]);}catch(e){S.dlgMsg="Bad inner JSON";render();return;}}if(!st||!st.logs){S.dlgMsg="No logs found";render();return;}S.logs=st.logs;S.skipped=st.skipped||{ion:[],brit:[]};S.dlg=null;S.vi=null;persist();render();}
document.addEventListener("click",function(ev){
  if(ev.target.id==="md"){S.dlg=null;render();return;}
  var t=ev.target;while(t&&t!==document.body){if(t.dataset&&t.dataset.a)break;t=t.parentNode;}
  if(!t||!t.dataset||!t.dataset.a)return;var a=t.dataset.a;
  if(a==="per"){S.person=t.dataset.p;S.es=null;render();}
  else if(a==="tab"){S.tab=t.dataset.t;render();}
  else if(a==="prev"){var i=curI();if(i>0){S.vi=i-1;S.es=null;render();}}
  else if(a==="next"){var i=curI();if(i<TOT-1){S.vi=i+1;S.es=null;render();}}
  else if(a==="goto"){S.vi=null;render();}
  else if(a==="peek"){S.peek=!S.peek;render();}
  else if(a==="done"){var l=plogs()[curI()];if(l){l.done=!l.done;persist();render();}}
  else if(a==="bw"){toggleBW(t.dataset.e);}
  else if(a==="add"){submit(t.dataset.e);}
  else if(a==="save"){saveEdit(t.dataset.e);}
  else if(a==="cancel"){S.es=null;render();}
  else if(a==="edit"){ev.stopPropagation();S.es={n:t.dataset.e,i:+t.dataset.i};render();var f=getF(t.dataset.e);if(f.r){f.r.focus();}}
  else if(a==="del"){ev.stopPropagation();del(t.dataset.e,+t.dataset.i);}
  else if(a==="skip"){var idx=curI();if(psk().indexOf(idx)<0)psk().push(idx);S.vi=null;persist();render();}
  else if(a==="jump"){S.tab="workout";S.vi=+t.dataset.i;render();}
  else if(a==="addOpen"){S.addEx=true;S.addExName="";render();setTimeout(function(){var i=document.getElementById("addI");if(i)i.focus();},30);}
  else if(a==="addCx"){S.addEx=false;render();}
  else if(a==="addGo"){var i=document.getElementById("addI");var nm=(i&&i.value||"").trim();if(nm){var l=ensureLog(curI());var ex=false;for(var z=0;z<l.exs.length;z++)if(l.exs[z].n===nm)ex=true;if(!ex)l.exs.push({n:nm,s:[]});}S.addEx=false;S.vi=curI();persist();render();}
  else if(a==="resync"){if(cloudUser){subCloud();}else if(fbOK()){showLogin();}}
  else if(a==="exp"){expOpen();}
  else if(a==="imp"){S.dlg="imp";S.dlgTxt="";S.dlgMsg="";render();}
  else if(a==="closeD"){S.dlg=null;render();}
  else if(a==="copyD"){var ta=document.getElementById("dta");if(ta){ta.focus();ta.select();try{document.execCommand("copy");S.dlgMsg="Copied.";}catch(e){S.dlgMsg="Select + copy.";}render();}}
  else if(a==="doImp"){doImp();}
});
document.addEventListener("input",function(e){if(e.target.id==="addI")S.addExName=e.target.value;});
document.addEventListener("keydown",function(e){
  if(e.key!=="Enter")return;var f=e.target.dataset&&e.target.dataset.f;if(!f)return;e.preventDefault();var nm=e.target.dataset.e;var ff=getF(nm);
  if(f==="w"){if(ff.r)ff.r.focus();}else if(f==="r"){if(ff.no)ff.no.focus();}else{if(!ff.r||!ff.r.value){if(ff.r)ff.r.focus();return;}if(S.es&&S.es.n===nm)saveEdit(nm);else submit(nm);}
});
document.addEventListener("change",function(e){if(e.target&&e.target.dataset&&e.target.dataset.a==="date"){var l=ensureLog(curI());l.date=e.target.value;persist();render();}});
render();
document.addEventListener("gesturestart",function(e){e.preventDefault();},{passive:false});
document.addEventListener("gesturechange",function(e){e.preventDefault();},{passive:false});
(function waitFB(n){if(typeof firebase!=="undefined"){cloudInit();}else if(n>0){setTimeout(function(){waitFB(n-1);},100);}})(80);
}catch(err){var d=document.getElementById("err");if(d){d.style.display="block";d.textContent="ERROR\n\n"+(err&&err.stack||err);}}
</script>
